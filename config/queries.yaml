# Source de vérité pour les requêtes Vinted surveillées par le bot.
# Éditer ce fichier puis lancer `python sync_queries.py` pour appliquer.
#
# Chaque section groupe des recherches sous une categorie/platform commune.
# - `categorie` (optionnel) : ID Vinted catalog[]. Absent = pas de filtre
#   de catégorie (filet de sécurité, cherche sur tout Vinted).
# - `platform` (optionnel) : video_game_platform_ids[] (jeux vidéo/consoles).
# - `recherches[].texte` (optionnel) : texte de recherche (search_text).
#   Absent = pas de search_text, on parcourt juste la catégorie par prix
#   (utile pour une catégorie précise où le texte n'apporte rien).
# - `recherches[].nom` : nom affiché sur /queries (obligatoire).

